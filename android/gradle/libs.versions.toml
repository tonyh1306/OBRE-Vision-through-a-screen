espressoWeb = "3.7.0"
firebaseCrashlyticsBuildtools = "3.0.6"
guava = "33.3.1-jre"
firebaseInappmessaging = "22.0.2"
common = "0.10.0"
firebaseAi = "17.6.0"
generativeai = "0.9.0"
fragment = "1.6.2"
